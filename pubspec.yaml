name: evoly
description: A local-first goal planning and reminder app.
publish_to: 'none'
version: 0.3.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.4.2
  path: ^1.9.1
  uuid: ^4.5.3
  provider: ^6.1.5+1
  flutter_local_notifications: ^22.0.1
  flutter_markdown: ^0.7.7+1
  timezone: ^0.11.0
  flutter_timezone: ^5.1.0
  flutter_math_fork: ^0.7.4
  markdown: ^7.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

hooks:
  user_defines:
    sqlite3:
      source: system
      name_windows: winsqlite3
      name: sqlite3
